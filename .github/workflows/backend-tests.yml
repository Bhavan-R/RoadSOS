name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install ruff
        run: pip install ruff==0.11.13

      - name: Lint
        run: ruff check . --output-format=github

      - name: Check formatting
        run: ruff format --check .

  startup-check:
    name: App startup check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      ANTHROPIC_API_KEY: "dummy-for-import-check"
      Mapsplatformkey: "dummy-for-import-check"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify app imports cleanly
        run: python -c "import main; print('✅ App imports OK')"

  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [lint, startup-check]

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest --tb=short -q

      - name: Upload coverage (optional)
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: backend/.pytest_cache
          if-no-files-found: ignore
